name: API image (GHCR)

# Builds the FastAPI service image on GitHub's runners (7GB RAM) and pushes it to
# GHCR, so resource-constrained hosts (e.g. the OCI micro VM) only need a light
# `docker pull` — no in-place build, no OOM risk to co-tenant services.

on:
  push:
    branches: [master]
    paths:
      - "services/api/**"
      - "infra/api.Dockerfile"
      - ".github/workflows/api-image.yml"
  workflow_dispatch: {}

concurrency:
  group: api-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/convergeo-api" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/api.Dockerfile
          # amd64 for the x86 micro VM; arm64 for a potential A1.Flex free box.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
