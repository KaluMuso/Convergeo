name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  js:
    name: JavaScript / TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Resolve Turbo filter
        id: turbo
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "filter=...[${{ github.event.pull_request.base.sha }}]" >> "$GITHUB_OUTPUT"
          else
            echo "filter=...[HEAD^1]" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        run: pnpm turbo run lint --filter="${{ steps.turbo.outputs.filter }}"

      - name: Typecheck
        run: pnpm turbo run typecheck --filter="${{ steps.turbo.outputs.filter }}"

      - name: Test
        run: pnpm turbo run test --filter="${{ steps.turbo.outputs.filter }}"

      - name: Build
        run: pnpm turbo run build --filter="${{ steps.turbo.outputs.filter }}"

  python:
    name: Python API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: services/api/.python-version

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy app tests scripts

      - name: Pytest
        run: uv run pytest
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          SUPABASE_ANON_KEY: test-anon-key

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  deps-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: pnpm audit (high+)
        continue-on-error: true
        run: pnpm audit --audit-level=high

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: services/api/.python-version

      - name: pip-audit (API)
        continue-on-error: true
        working-directory: services/api
        run: |
          uv sync --dev
          uv tool run pip-audit

  i18n-lint:
    name: i18n hardcoded strings (warn)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run hardcoded-string lint (warn)
        run: |
          cat > .github/i18n-eslint.ci.mjs <<'EOF'
          import plugin from "../packages/i18n/eslint-no-hardcoded-strings.js";
          import tseslint from "typescript-eslint";

          export default tseslint.config(
            { ignores: ["**/node_modules/**", "**/.next/**"] },
            ...tseslint.configs.recommended,
            {
              files: ["apps/**/app/**/*.{tsx,jsx}"],
              plugins: { i18n: plugin },
              rules: { "i18n/no-hardcoded-strings": "warn" },
            },
          );
          EOF
          pnpm exec eslint \
            "apps/customer/app" \
            "apps/vendor/app" \
            "apps/admin/app" \
            --config .github/i18n-eslint.ci.mjs \
            --max-warnings 9999

  migrations:
    name: Migration replay (fast)
    runs-on: ubuntu-latest
    services:
      postgres:
        # Postgres 16 with pgvector — required for migration 0001 (vector extension).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Replay migrations (Dockerless pre-flight)
        run: bash scripts/ci/migration-replay.sh
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres

  db:
    name: Database / typegen drift
    needs: migrations
    runs-on: ubuntu-latest
    # config.toml uses env() substitution for the enabled send_sms auth hook and
    # Google OAuth provider. The Supabase CLI resolves these on `db start`, so the
    # job cannot bring the stack up without them and previously failed (which let
    # 0009's migration bugs merge past a red-but-bypassed check). These are dummy
    # CI-only values — never real secrets.
    env:
      SEND_SMS_HOOK_SECRET: "v1,whsec_Y2ktZHVtbXktc2VuZC1zbXMtaG9vay1zZWNyZXQtMDAw"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: "ci-dummy-google-client-id"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: "ci-dummy-google-secret"
      SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: "ci-dummy-apple-secret"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local database
        run: supabase db start

      - name: Reset local database
        run: supabase db reset --no-seed

      - name: Regenerate types
        run: bash scripts/gen-types.sh

      - name: Fail on stale committed types
        run: git diff --exit-code packages/types/src/db.ts

  rls:
    name: RLS isolation matrix
    runs-on: ubuntu-latest
    # Same auth-hook/OAuth dummy env as db — stack cannot start without them.
    env:
      SEND_SMS_HOOK_SECRET: "v1,whsec_Y2ktZHVtbXktc2VuZC1zbXMtaG9vay1zZWNyZXQtMDAw"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: "ci-dummy-google-client-id"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: "ci-dummy-google-secret"
      SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: "ci-dummy-apple-secret"
      SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      SUPABASE_ANON_KEY: test-anon-key
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local database
        run: supabase db start

      - name: Reset local database (with seed)
        run: supabase db reset

      - name: Seed demo data
        continue-on-error: true
        run: uv run python ../../scripts/seed.py --env local

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: services/api/.python-version

      - name: Install dependencies
        run: uv sync --dev

      - name: RLS isolation matrix
        # Wired for M03-P09 (same wave). Goes green once services/api/tests/rls lands.
        run: uv run pytest tests/rls -q
