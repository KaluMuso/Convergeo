name: CI

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    # Nightly Ask Vergeo grounding evals (02:17 UTC). The ask-evals job runs on
    # every scheduled trigger; other jobs are unchanged and simply re-run green.
    - cron: "17 2 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  js:
    name: JavaScript / TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Resolve Turbo filter
        id: turbo
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "filter=...[${{ github.event.pull_request.base.sha }}]" >> "$GITHUB_OUTPUT"
          else
            echo "filter=...[HEAD^1]" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        run: pnpm turbo run lint --filter="${{ steps.turbo.outputs.filter }}"

      - name: Typecheck
        run: pnpm turbo run typecheck --filter="${{ steps.turbo.outputs.filter }}"

      - name: Test
        run: pnpm turbo run test --filter="${{ steps.turbo.outputs.filter }}"

      - name: Build
        run: pnpm turbo run build --filter="${{ steps.turbo.outputs.filter }}"

  python:
    name: Python API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version-file: services/api/.python-version

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy app tests scripts

      - name: Pytest
        # Blocking full suite (testpaths=tests) — includes the route x role authz
        # matrix (tests/test_authz_matrix.py) and the rate-limit fuzz suite
        # (tests/fuzz, once M15-P04 lands) as security gates.
        run: uv run pytest
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          SUPABASE_ANON_KEY: test-anon-key

  ask-evals:
    name: Ask Vergeo grounding evals
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so the path filter can diff against the PR base sha.
          fetch-depth: 0

      - name: Detect Ask pipeline changes
        id: changes
        run: |
          # Nightly schedule + master pushes always run the grounding gate.
          if [ "${{ github.event_name }}" = "schedule" ] || \
             [ "${{ github.event_name }}" = "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # git prints repo-root-relative paths regardless of cwd.
          if git diff --name-only "$base" HEAD | grep -Eq \
             '^(services/api/app/services/ask/|services/api/app/routers/ask\.py|services/api/tests/evals/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup uv
        if: steps.changes.outputs.run == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-python@v7
        with:
          python-version-file: services/api/.python-version

      - name: Install dependencies
        if: steps.changes.outputs.run == 'true'
        run: uv sync --dev

      - name: Grounding evals (deterministic — no live API key)
        if: steps.changes.outputs.run == 'true'
        run: uv run pytest tests/evals -q

  staging-guards:
    name: Staging plane guards (STG-01)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Self-test separation + seed + config syntax
        run: bash scripts/ci/test-staging-guards.sh

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # Blocking (RC-06 / G8 / VE-P04): any real finding fails the job.
    # Pinned CLI >=8.28 — path/regex allowlists are broken on gitleaks 8.24.x.
    env:
      GITLEAKS_VERSION: "8.28.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Self-test scanner catches planted secret
        run: bash scripts/ci/gitleaks-self-test.sh

      - name: Validate n8n workflows have no plaintext secrets
        run: bash scripts/ci/validate-n8n-no-plaintext-secrets.sh

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact

  deps-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: pnpm audit (fail on high)
        # Blocking (M15-P05): any high/critical advisory fails the pipeline, EXCEPT a
        # written allowlist of accepted advisories. Accepted:
        #   GHSA-ph9p-34f9-6g65 — tmp<0.2.6 path traversal, transitive via @lhci/cli
        #     (Lighthouse CI). Dev/CI-only, never bundled into a shipped app or the API
        #     runtime => no production exposure. See docs/ops/owasp-audit.md (A06/F1).
        #     Remove this entry once @lhci/cli ships a tmp>=0.2.6.
        run: |
          ALLOWLIST="GHSA-ph9p-34f9-6g65"
          pnpm audit --audit-level=high --json > audit.json || true
          ALLOWLIST="$ALLOWLIST" python3 - <<'PY'
          import json, os, sys
          allow = set(os.environ["ALLOWLIST"].split())
          data = json.load(open("audit.json"))
          blocking = []
          for adv in data.get("advisories", {}).values():
              if adv.get("severity") in ("high", "critical"):
                  ghsa = adv.get("github_advisory_id", "")
                  if ghsa in allow:
                      print(f"::notice::allowlisted {ghsa} ({adv.get('module_name')}) — see owasp-audit.md")
                      continue
                  blocking.append(f"{adv.get('severity')} {ghsa} {adv.get('module_name')}")
          if blocking:
              print("::error::blocking high/critical advisories:")
              for b in blocking:
                  print(f"  - {b}")
              sys.exit(1)
          print("pnpm audit: no blocking high/critical advisories")
          PY

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version-file: services/api/.python-version

      - name: pip-audit (API, fail on high)
        # Blocking (M15-P05): pip-audit is non-zero on any known vulnerability.
        working-directory: services/api
        run: |
          uv sync --dev
          uv tool run pip-audit

  security-gates:
    name: Security gates (headers + authz matrix)
    # Blocking (M15-P05). Runs in parallel with `python`, so the redundant authz-matrix
    # run adds no wall-clock time while giving a named, required security check.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Security headers manifest check
        # M15-P03 shipped scripts/ci/check-headers.mjs (node stdlib only, no install).
        run: node scripts/ci/check-headers.mjs

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version-file: services/api/.python-version

      - name: Install API dependencies
        working-directory: services/api
        run: uv sync --dev

      - name: Route x role authz matrix (no DB)
        # Isolation-clean (dependency overrides, guard short-circuits before any DB
        # call). Also runs under the full `python` job; named here as the security gate.
        working-directory: services/api
        run: uv run pytest tests/test_authz_matrix.py -q
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          SUPABASE_ANON_KEY: test-anon-key

  i18n-lint:
    name: i18n hardcoded strings (warn)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run hardcoded-string lint (warn)
        continue-on-error: true
        run: |
          cat > .github/i18n-eslint.ci.mjs <<'EOF'
          import vergeoPlugin from "../packages/config/eslint-rules/no-hardcoded-strings.js";
          import tseslint from "typescript-eslint";

          export default tseslint.config(
            { ignores: ["**/node_modules/**", "**/.next/**"] },
            ...tseslint.configs.recommended,
            {
              files: ["apps/**/app/**/*.{tsx,jsx}"],
              plugins: { "@vergeo": vergeoPlugin },
              rules: { "@vergeo/no-hardcoded-strings": "warn" },
            },
          );
          EOF
          pnpm exec eslint \
            "apps/customer/app" \
            "apps/vendor/app" \
            "apps/admin/app" \
            --config .github/i18n-eslint.ci.mjs \
            --max-warnings 9999

  migrations:
    name: Migration replay (fast)
    runs-on: ubuntu-latest
    services:
      postgres:
        # Postgres 16 with pgvector — required for migration 0001 (vector extension).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Replay migrations (Dockerless pre-flight)
        run: bash scripts/ci/migration-replay.sh
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres

      - name: Schema RLS + security_invoker (post-replay)
        # STG-01: same isolation checks the staging deploy job runs against the
        # remote staging DB — exercised here on a blank local replay including 0056.
        run: bash scripts/ci/check-staging-schema.sh
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres

  db:
    name: Database / typegen drift
    needs: migrations
    runs-on: ubuntu-latest
    # config.toml uses env() substitution for the enabled send_sms auth hook and
    # Google OAuth provider. The Supabase CLI resolves these on `db start`, so the
    # job cannot bring the stack up without them and previously failed (which let
    # 0009's migration bugs merge past a red-but-bypassed check). These are dummy
    # CI-only values — never real secrets.
    env:
      SEND_SMS_HOOK_SECRET: "v1,whsec_Y2ktZHVtbXktc2VuZC1zbXMtaG9vay1zZWNyZXQtMDAw"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: "ci-dummy-google-client-id"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: "ci-dummy-google-secret"
      SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: "ci-dummy-apple-secret"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pinned (not `latest`) so setup-cli skips the unauthenticated
          # GitHub "resolve latest release" API call, which intermittently
          # hits rate limits and fails the db/rls/bundle jobs. Bump manually.
          version: 2.109.1

      - name: Start local database
        run: supabase db start

      - name: Reset local database
        run: supabase db reset --no-seed

      - name: Regenerate types
        run: bash scripts/gen-types.sh

      - name: Fail on stale committed types
        run: git diff --exit-code packages/types/src/db.ts

  rls:
    name: RLS isolation matrix
    runs-on: ubuntu-latest
    # Same auth-hook/OAuth dummy env as db — stack cannot start without them.
    env:
      SEND_SMS_HOOK_SECRET: "v1,whsec_Y2ktZHVtbXktc2VuZC1zbXMtaG9vay1zZWNyZXQtMDAw"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: "ci-dummy-google-client-id"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: "ci-dummy-google-secret"
      SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: "ci-dummy-apple-secret"
      SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      SUPABASE_ANON_KEY: test-anon-key
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pinned (not `latest`) so setup-cli skips the unauthenticated
          # GitHub "resolve latest release" API call, which intermittently
          # hits rate limits and fails the db/rls/bundle jobs. Bump manually.
          version: 2.109.1

      - name: Start local database
        run: supabase db start

      - name: Reset local database (with seed)
        run: supabase db reset

      - name: Seed demo data
        continue-on-error: true
        run: uv run python ../../scripts/seed.py --env local

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version-file: services/api/.python-version

      - name: Install dependencies
        run: uv sync --dev

      - name: DB-backed integration (curated, isolation-clean)
        run: uv run pytest tests/test_db_adapter.py tests/test_ticket_purchase.py tests/test_ticket_verify.py tests/test_ticket_wallet.py tests/test_ticket_scan_sync.py tests/test_ticket_transfer.py tests/test_event_release.py tests/test_search_analytics.py tests/test_service_escrow.py tests/test_vendor_analytics.py tests/test_review_aggregate.py tests/test_listing_below_median.py -q

      - name: RLS isolation matrix
        # Wired for M03-P09 (same wave). Goes green once services/api/tests/rls lands.
        continue-on-error: true
        run: uv run pytest tests/rls -q

  money-db-triggers:
    name: Money DB-trigger integration
    runs-on: ubuntu-latest
    # Release-accounting, release-idempotency and reconciliation DB tests exercise the
    # SQL-trigger money path (zero-sum, guarded release ordering, recon report uniqueness).
    # They skip without a live Postgres, and each seeds its own platform ledger-account id
    # family — so they collide with each other and with the rls job's curated set in one
    # process on the unique ledger_accounts_kind_platform_key. Run each in isolation against
    # a bare pgvector service, resetting the schema per file (the module `db` fixture then
    # re-applies migrations). Keeps this money coverage from silently skipping in CI.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/api
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      PGPASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version-file: services/api/.python-version

      - name: Install dependencies
        run: uv sync --dev

      - name: Provision Supabase-managed roles
        # AUTH_BOOTSTRAP_SQL (tests/rls/conftest.py) creates anon/authenticated/service_role
        # but not the GoTrue roles migration 0051 grants to; add them like
        # scripts/ci/migration-replay.sh does for its bare-Postgres replay.
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_admin') THEN
              CREATE ROLE supabase_admin LOGIN SUPERUSER;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'supabase_auth_admin') THEN
              CREATE ROLE supabase_auth_admin NOLOGIN NOINHERIT;
            END IF;
          END $$;
          SQL

      - name: Release / accounting / reconcile (each isolated)
        run: |
          for f in test_release test_release_accounting test_reconcile; do
            echo "::group::$f"
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
              -c "DROP SCHEMA IF EXISTS public CASCADE; CREATE SCHEMA public; DROP SCHEMA IF EXISTS auth CASCADE;"
            uv run pytest "tests/$f.py" -q
            echo "::endgroup::"
          done

  cod-container-smoke:
    name: COD production-container smoke
    # Blocking (WP-1B): builds the real infra/api.Dockerfile image and drives ONE
    # Cash-on-Delivery order through the running container against an isolated Postgres,
    # asserting order created + audit entry (transaction-local actor/note context) +
    # ledger/commission postings + consistent order/escrow state. Proves the runtime
    # image's native psycopg write path (WP-1A) works with NO psql binary and NO
    # external network — Lenco, WhatsApp and Supabase are never contacted (auth is a
    # localhost JWKS/user_roles stub with a self-minted token). The job is always
    # present so it stays a stable required check; the heavy steps run only when the API,
    # its Dockerfile, the migration shim, or this workflow change — and always on master.
    runs-on: ubuntu-latest
    services:
      postgres:
        # Postgres 16 with pgvector — the same image the `migrations` job replays onto.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so the path filter can diff against the PR base sha.
          fetch-depth: 0

      - name: Detect API / Dockerfile changes
        id: changes
        run: |
          # master pushes (and the nightly schedule) always run the container gate.
          if [ "${{ github.event_name }}" = "push" ] || \
             [ "${{ github.event_name }}" = "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base" HEAD | grep -Eq \
             '^(services/api/|infra/api\.Dockerfile|scripts/ci/migration-replay\.sh|\.github/workflows/ci\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install PostgreSQL client
        # Host-side psql for the schema replay + fixture seed + assertions. The CONTAINER
        # must never need it — that is precisely what this test guards.
        if: steps.changes.outputs.run == 'true'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Setup uv
        if: steps.changes.outputs.run == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-python@v7
        with:
          python-version-file: services/api/.python-version

      - name: Install API dependencies
        if: steps.changes.outputs.run == 'true'
        working-directory: services/api
        run: uv sync --dev

      - name: Set up Buildx
        if: steps.changes.outputs.run == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build the real API runtime image
        if: steps.changes.outputs.run == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/api.Dockerfile
          load: true
          tags: vergeo5-api:cod-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Drive one COD order through the running image
        if: steps.changes.outputs.run == 'true'
        working-directory: services/api
        run: uv run python tests/container/cod_container_smoke.py
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          VERGEO5_API_IMAGE: vergeo5-api:cod-smoke
