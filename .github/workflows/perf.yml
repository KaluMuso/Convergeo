name: Performance budgets

on:
  pull_request:

concurrency:
  group: perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  perf:
    name: Bundle, image lint & Lighthouse
    runs-on: ubuntu-latest
    # Same auth-hook/OAuth dummy env as CI db/rls — Supabase CLI cannot start without them.
    env:
      SEND_SMS_HOOK_SECRET: "v1,whsec_Y2ktZHVtbXktc2VuZC1zbXMtaG9vay1zZWNyZXQtMDAw"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: "ci-dummy-google-client-id"
      SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: "ci-dummy-google-secret"
      SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: "ci-dummy-apple-secret"
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: demo
      SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      ENV: development
      CORS_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout (head)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      # Blocking i18n completeness gate (M16-P03). Pure-node + offline, so it
      # runs BEFORE the expensive Supabase/build steps and fails fast. Covers
      # hardcoded strings (template/aria/meta), missing keys (used-vs-defined),
      # formatK bypasses, plus the en-XA pseudo-locale coverage smoke. The
      # --self-test asserts the detectors still have teeth against a seeded fixture.
      - name: i18n completeness sweep (blocking)
        run: |
          node scripts/ci/i18n-lint.mjs --self-test
          node scripts/ci/i18n-lint.mjs --pseudo-smoke
          node scripts/ci/i18n-lint.mjs

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start -x edge-runtime

      - name: Reset local database (with seed)
        run: |
          # supabase db reset occasionally 502s while restarting containers after
          # migrations (CLI flake). Bounce the stack between attempts instead of
          # only sleeping — a bare retry against a wedged Kong/PostgREST keeps failing.
          for attempt in 1 2 3 4 5; do
            if supabase db reset; then
              exit 0
            fi
            echo "supabase db reset attempt ${attempt} failed; bouncing local stack..."
            supabase stop --no-backup || true
            sleep 10
            supabase start -x edge-runtime
            sleep 15
          done
          exit 1

      - name: Load local Supabase credentials
        run: |
          eval "$(supabase status -o env)"
          # Default local stack keys (supabase demo JWTs) when status omits them.
          API_URL="${API_URL:-http://127.0.0.1:54321}"
          ANON_KEY="${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}"
          SERVICE_ROLE_KEY="${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6OjE5ODM4MTI5OTZ9.EGIM96RAZx35lJzdJsyH-qwvQH-pOzsp1rO40Ideu4}"
          DB_URL="${DB_URL:-postgresql://postgres:postgres@127.0.0.1:54322/postgres}"
          {
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "SUPABASE_DB_URL=${DB_URL}"
          } >> "$GITHUB_ENV"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: services/api/.python-version

      - name: Seed demo catalog fixtures
        run: |
          cd services/api
          uv sync
          uv run python ../../scripts/seed.py --env local

      - name: Start API
        working-directory: services/api
        run: |
          uv sync
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/api-pid
          for attempt in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/healthz >/dev/null; then
              echo "API ready on :8000"
              if ! curl -sf http://127.0.0.1:8000/products/smartphone-x1 >/dev/null; then
                echo "API product fixture missing for /products/smartphone-x1" >&2
                curl -i http://127.0.0.1:8000/products/smartphone-x1 || true
                exit 1
              fi
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become ready"
          exit 1

      - name: Build customer app (head)
        run: pnpm --filter customer build

      - name: Build customer app (base) for delta comparison
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          cp scripts/ci/bundle-guard.mjs /tmp/bundle-guard.mjs
          cp -r apps/customer/.next /tmp/head-next
          git checkout "$BASE_SHA"
          pnpm --filter customer build
          node /tmp/bundle-guard.mjs \
            --manifest "$GITHUB_WORKSPACE/apps/customer/.next/app-build-manifest.json" \
            --next-dir "$GITHUB_WORKSPACE/apps/customer/.next" \
            --write-baseline /tmp/base-bundle.json \
            --write-baseline-only
          rm -rf apps/customer/.next
          git checkout -
          mv /tmp/head-next apps/customer/.next

      - name: Bundle guard
        run: |
          if [ -f /tmp/base-bundle.json ]; then
            node scripts/ci/bundle-guard.mjs --baseline /tmp/base-bundle.json
          else
            node scripts/ci/bundle-guard.mjs
          fi

      - name: Image lint
        run: node scripts/ci/image-lint.mjs

      - name: Guard script self-tests
        run: |
          node scripts/ci/bundle-guard.mjs --self-test
          node scripts/ci/image-lint.mjs --self-test

      - name: Validate Lighthouse config
        run: node --input-type=module -e "
          import { readFileSync } from 'node:fs';
          const cfg = JSON.parse(readFileSync('lighthouserc.json', 'utf8'));
          if (!cfg.ci?.collect?.url?.length) throw new Error('missing ci.collect.url');
          if (!cfg.vergeo?.bundle?.defaultMaxKbGz) throw new Error('missing vergeo.bundle');
          console.log('lighthouserc.json OK —', cfg.ci.collect.url.length, 'URLs,',
          'LCP ≤', cfg.ci.assert.assertions['largest-contentful-paint'][1].maxNumericValue, 'ms');
          "

      - name: Start production server
        run: |
          pnpm --filter customer start &
          echo $! > /tmp/customer-pid
          for attempt in $(seq 1 60); do
            if curl -sf http://localhost:3000/en/health >/dev/null; then
              echo "Customer app ready on :3000"
              break
            fi
            sleep 2
          done
          if ! curl -sf http://localhost:3000/en/health >/dev/null; then
            echo "Server failed to become ready"
            exit 1
          fi
          for url in \
            http://localhost:3000/en \
            http://localhost:3000/en/c/electronics \
            http://localhost:3000/en/p/smartphone-x1 \
            http://localhost:3000/en/search \
            http://localhost:3000/en/checkout; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$url")
            echo "$url -> $code"
            if [ "$code" != "200" ]; then
              echo "Lighthouse target not ready: $url"
              exit 1
            fi
          done

      - name: Lighthouse CI (advisory — see lighthouserc.json)
        # Advisory until LHCI runs against a real Vercel preview: assertions are
        # `warn` (never non-zero) and this step is non-blocking so a CI-environment
        # score dip or LHCI flake can't fail a PR. Blocking gate = bundle-guard + image-lint above.
        continue-on-error: true
        run: pnpm exec lhci autorun --config=lighthouserc.json

      - name: Stop servers
        if: always()
        run: |
          if [ -f /tmp/customer-pid ]; then
            kill "$(cat /tmp/customer-pid)" 2>/dev/null || true
          fi
          if [ -f /tmp/api-pid ]; then
            kill "$(cat /tmp/api-pid)" 2>/dev/null || true
          fi

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
