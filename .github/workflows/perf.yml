name: Performance budgets

on:
  pull_request:

concurrency:
  group: perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  perf:
    name: Bundle, image lint & Lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (head)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build customer app (head)
        run: pnpm --filter customer build

      - name: Build customer app (base) for delta comparison
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          cp -r apps/customer/.next /tmp/head-next
          git checkout "$BASE_SHA"
          pnpm --filter customer build
          node scripts/ci/bundle-guard.mjs --write-baseline /tmp/base-bundle.json
          rm -rf apps/customer/.next
          git checkout -
          mv /tmp/head-next apps/customer/.next

      - name: Bundle guard
        run: |
          if [ -f /tmp/base-bundle.json ]; then
            node scripts/ci/bundle-guard.mjs --baseline /tmp/base-bundle.json
          else
            node scripts/ci/bundle-guard.mjs
          fi

      - name: Image lint
        run: node scripts/ci/image-lint.mjs

      - name: Guard script self-tests
        run: |
          node scripts/ci/bundle-guard.mjs --self-test
          node scripts/ci/image-lint.mjs --self-test

      - name: Validate Lighthouse config
        run: node --input-type=module -e "
          import { readFileSync } from 'node:fs';
          const cfg = JSON.parse(readFileSync('lighthouserc.json', 'utf8'));
          if (!cfg.ci?.collect?.url?.length) throw new Error('missing ci.collect.url');
          if (!cfg.vergeo?.bundle?.defaultMaxKbGz) throw new Error('missing vergeo.bundle');
          console.log('lighthouserc.json OK —', cfg.ci.collect.url.length, 'URLs,',
          'LCP ≤', cfg.ci.assert.assertions['largest-contentful-paint'][1].maxNumericValue, 'ms');
          "

      - name: Start production server
        run: |
          pnpm --filter customer start &
          echo $! > /tmp/customer-pid
          for attempt in $(seq 1 60); do
            if curl -sf http://localhost:3000/en/health >/dev/null; then
              echo "Customer app ready on :3000"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to become ready"
          exit 1

      - name: Lighthouse CI
        run: pnpm exec lhci autorun --config=lighthouserc.json

      - name: Stop production server
        if: always()
        run: |
          if [ -f /tmp/customer-pid ]; then
            kill "$(cat /tmp/customer-pid)" 2>/dev/null || true
          fi

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
