# Ask Vergeo grounding eval set (M06-P05).
#
# Deterministic, no live API key: each entry ships a fixture retrieval set and a
# recorded model answer. The harness (test_ask_grounding.py) injects both into
# run_ask() and asserts the grounding invariants:
#   * no cited entity_id outside the retrieved fixture_docs (no fabrication);
#   * refusal on trap / no-answer questions (empty fixture_docs);
#   * ZMW ngwee -> decimal correctness surfaced in the citation price_display.
#
# Prices are integer ngwee (100 ngwee = K1.00). zmw_contains is checked against
# the pipeline-computed citation price_display, so it proves format_k() end to end.
#
# Categories: exact | fuzzy | semantic | price_filtered | no_answer.

