[mypy]
python_version = 3.12
strict = True
warn_unused_configs = True
explicit_package_bases = True

[mypy-supabase.*]
ignore_missing_imports = True

[mypy-postgrest.*]
ignore_missing_imports = True

[mypy-gotrue.*]
ignore_missing_imports = True

[mypy-storage3.*]
ignore_missing_imports = True

[mypy-realtime.*]
ignore_missing_imports = True
