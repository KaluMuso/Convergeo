# Vergeo5 gitleaks config — tuned allowlists for docs/fixtures/examples only.
# Must NOT allowlist real secret shapes (AWS keys, JWTs, private keys, etc.).
#
# Requires gitleaks >= 8.28 (path/regex allowlists are broken on 8.24.x).
# CI installs a pinned CLI — see .github/workflows/ci.yml secret-scan job.

title = "Vergeo5 gitleaks"

[extend]
useDefault = true

[[allowlists]]
description = "Documentation, test fixtures, and example env files (paths only)"
paths = [
  '''(?i)docs/''',
  '''(?i)services/api/tests/fixtures/''',
  '''(?i)infra/\.env\.example$''',
  '''(?i)\.env\.example$''',
  '''(?i)packages/.*/\.env\.example$''',
  '''(?i)apps/.*/\.env\.example$''',
]

[[allowlists]]
description = "Placeholder / example env var names in .env.example (names only, not values)"
regexes = [
  '''(?i)(EXAMPLE|PLACEHOLDER|YOUR_|CHANGE_ME|REPLACE_ME|TODO_SET|DUMMY|CI_DUMMY|ci-dummy)''',
]

[[allowlists]]
description = "Documented dummy CI values referenced in workflow comments"
regexes = [
  '''ci-dummy-(google|apple)-''',
]

[[allowlists]]
description = "Intentional synthetic secrets used only to unit-test scrubbers / webhook verifiers"
paths = [
  '''(?i)services/api/tests/test_sentry_scrubber\.py$''',
  '''(?i)supabase/functions/send-sms-otp/index\.test\.ts$''',
  '''(?i)services/api/tests/test_ticket_wallet\.py$''',
  # Synthetic Bearer/sk_live fixture for scrubber unit tests (not a live credential).
  '''(?i)packages/observability/src/scrub\.test\.ts$''',
  # Self-test plants a synthetic key at runtime; older commits of this file also
  # contained contiguous fixture strings that must not block the repo-wide scan.
  '''(?i)scripts/ci/gitleaks-self-test\.sh$''',
]

[[allowlists]]
description = "Public Vergeo5 hostnames used as staging negative-fixtures (not credentials)"
regexes = [
  '''(?i)api\.vergeo5\.com''',
]

[[allowlists]]
description = "Verified generic-api-key false positives (non-secret substrings in history)"
regexes = [
  '''question=normalized''',
  '''dispute/cancel''',
  '''golden-fixture-key-42''',
]
